<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamlesh Vaishnav - Car Sales</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
        }

        .owner {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }

        .container {
            padding: 20px;
        }

        .car {
            background: white;
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .car h2 {
            margin: 0 0 10px;
        }

        .car p {
            margin: 5px 0;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #1e3a8a;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>🚗 Car Sales Website</h1>
    <p class="owner">Owner: Kamlesh Vaishnav</p>
</header>

<div class="container">

    <div class="car">
        <h2>Maruti Suzuki Swift</h2>
        <p>Price: ₹6,00,000</p>
        <p>Year: 2022</p>
        <p>Fuel: Petrol</p>
    </div>

    <div class="car">
        <h2>Hyundai Creta</h2>
        <p>Price: ₹10,50,000</p>
        <p>Year: 2023</p>
        <p>Fuel: Diesel</p>
    </div>

    <div class="car">
        <h2>Tata Nexon</h2>
        <p>Price: ₹9,00,000</p>
        <p>Year: 2021</p>
        <p>Fuel: Petrol</p>
    </div>

</div>

<footer>
    <p>© 2026 Kamlesh Vaishnav | All Rights Reserved</p>
</footer>

</html>
